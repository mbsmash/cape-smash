<div class="events-container">
  <!-- Event Cards Grid -->
  <div class="event-cards-grid">
    <a 
      *ngFor="let tournament of tournaments" 
      [href]="tournament.url" 
      class="event-card" 
      target="_blank" 
      rel="noopener noreferrer">
      <div class="event-card-image" [style.background-image]="tournament.imageUrl ? 'url(' + tournament.imageUrl + ')' : null"></div>
      <div class="event-card-content">
        <h3 class="event-card-title">{{ tournament.name }}</h3>
        <p class="event-card-frequency">{{ tournament.frequency }}</p>
        <p class="event-card-venue">{{ tournament.venue }}</p>
        <p class="event-card-address">{{ tournament.address }}</p>
        <p class="event-card-location">{{ tournament.location }}</p>
        <span class="event-card-arrow">→</span>
      </div>
    </a>
  </div>

  <!-- Footer Notice -->
  <div class="events-footer">
    <p class="footer-notice">💡 Click any event to view the most recent tournament on start.gg!</p>
  </div>
</div>
