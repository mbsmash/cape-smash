<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Recorder</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", sans-serif;
        background-color: #0f172a;
        background-image: radial-gradient(circle at top, #1e293b, #020617);
        min-height: 100%;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .card {
        width: min(640px, 100%);
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 30px 60px rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 1.5rem;
        font-weight: 600;
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        text-align: center;
      }

      label {
        display: block;
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
      }

      select,
      button,
      a.download-link {
        font: inherit;
        border-radius: 8px;
        padding: 0.65rem 1rem;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.9);
        color: inherit;
        transition: border-color 0.2s ease, transform 0.2s ease,
          background 0.2s ease;
        width: 100%;
        box-sizing: border-box;
      }

      select:focus,
      button:focus,
      a.download-link:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
      }

      button {
        cursor: pointer;
        margin-top: 1rem;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        border: none;
        color: white;
        font-weight: 600;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        background: rgba(148, 163, 184, 0.4);
      }

      .video-shell {
        margin-top: 1.5rem;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        background: black;
      }

      video {
        display: block;
        width: 100%;
        height: auto;
        background: black;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      a.download-link {
        text-align: center;
        text-decoration: none;
        background: rgba(34, 197, 94, 0.18);
        border-color: rgba(34, 197, 94, 0.45);
        color: #bbf7d0;
        font-weight: 600;
        display: none;
      }

      a.download-link.ready {
        display: block;
      }

      .status {
        margin-top: 1rem;
        min-height: 1.25rem;
        font-size: 0.9rem;
        color: rgba(226, 232, 240, 0.8);
        text-align: center;
      }

      .error {
        color: #fca5a5;
      }

      @media (max-width: 480px) {
        .card {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Record from a Video Device</h1>
      <div class="controls">
        <label for="videoDevices">Choose a video device</label>
        <select id="videoDevices" aria-label="Available video input devices">
          <option value="">Loading devices…</option>
        </select>
      </div>
      <div class="video-shell">
        <video id="preview" autoplay playsinline muted></video>
      </div>
      <div class="actions">
        <button id="recordButton" type="button" disabled>Record</button>
        <a id="downloadLink" class="download-link" download="recording.webm">Download recording</a>
      </div>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script>
      const deviceSelect = document.getElementById("videoDevices");
      const recordButton = document.getElementById("recordButton");
      const downloadLink = document.getElementById("downloadLink");
      const status = document.getElementById("status");
      const preview = document.getElementById("preview");

      let mediaRecorder = null;
      let recordedChunks = [];
      let currentStream = null;
      let recordingMimeType = "video/webm";

      const setStatus = (message, isError = false) => {
        status.textContent = message;
        status.classList.toggle("error", isError);
      };

      const stopStream = () => {
        if (!currentStream) return;
        currentStream.getTracks().forEach((track) => track.stop());
        currentStream = null;
        preview.srcObject = null;
      };

      const chooseMimeType = () => {
        const preferred = [
          "video/webm;codecs=vp9,opus",
          "video/webm;codecs=vp8,opus",
          "video/webm",
          "video/mp4",
        ];

        for (const type of preferred) {
          if (MediaRecorder.isTypeSupported(type)) {
            return type;
          }
        }
        return "";
      };

      const populateDeviceList = async () => {
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          const videoDevices = devices.filter((d) => d.kind === "videoinput");

          deviceSelect.innerHTML = "";

          if (!videoDevices.length) {
            const option = document.createElement("option");
            option.textContent = "No video devices found";
            option.value = "";
            deviceSelect.appendChild(option);
            recordButton.disabled = true;
            return;
          }

          videoDevices.forEach((device, index) => {
            const option = document.createElement("option");
            option.value = device.deviceId;
            option.textContent = device.label || `Camera ${index + 1}`;
            deviceSelect.appendChild(option);
          });

          recordButton.disabled = false;
        } catch (error) {
          console.error(error);
          setStatus(`Unable to list video devices: ${error.message}`, true);
          recordButton.disabled = true;
        }
      };

      const preparePreview = async () => {
        const deviceId = deviceSelect.value;
        if (!deviceId) {
          stopStream();
          return;
        }

        stopStream();

        try {
          const constraints = {
            audio: true,
            video: {
              deviceId: { exact: deviceId },
            },
          };

          currentStream = await navigator.mediaDevices.getUserMedia(constraints);
          preview.srcObject = currentStream;
          setStatus("Previewing selected device");
        } catch (error) {
          console.error(error);
          setStatus(`Unable to access the device: ${error.message}`, true);
        }
      };

      const startRecording = async () => {
        if (!deviceSelect.value) {
          setStatus("Choose a video device first", true);
          return;
        }

        await preparePreview();
        if (!currentStream) return;

        recordedChunks = [];
        recordingMimeType = chooseMimeType();

        try {
          mediaRecorder = new MediaRecorder(
            currentStream,
            recordingMimeType ? { mimeType: recordingMimeType } : undefined
          );
        } catch (error) {
          console.error(error);
          setStatus(`Unable to start recording: ${error.message}`, true);
          return;
        }

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            recordedChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, {
            type: recordingMimeType || "video/webm",
          });
          const url = URL.createObjectURL(blob);

          downloadLink.href = url;
          downloadLink.classList.add("ready");
          downloadLink.style.display = "block";
          downloadLink.textContent = "Download recording";

          setStatus("Recording complete. Download when ready.");
        };

        mediaRecorder.start();
        recordButton.textContent = "Stop";
        recordButton.dataset.state = "recording";
        downloadLink.classList.remove("ready");
        downloadLink.removeAttribute("href");
        downloadLink.style.display = "none";
        setStatus("Recording… Click stop to finish.");
      };

      const stopRecording = () => {
        if (!mediaRecorder) return;
        mediaRecorder.stop();
        recordButton.textContent = "Record";
        recordButton.dataset.state = "idle";
        setStatus("Processing recording…");
      };

      recordButton.addEventListener("click", async () => {
        if (recordButton.dataset.state === "recording") {
          stopRecording();
        } else {
          await startRecording();
        }
      });

      deviceSelect.addEventListener("change", () => {
        preparePreview();
      });

      window.addEventListener("beforeunload", () => {
        stopStream();
      });

      const initialize = async () => {
        if (!navigator.mediaDevices || !window.MediaRecorder) {
          setStatus("Media recording is not supported in this browser.", true);
          recordButton.disabled = true;
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });
          stream.getTracks().forEach((track) => track.stop());
        } catch (error) {
          console.warn("Permission prompt may have been dismissed.", error);
        } finally {
          await populateDeviceList();
          await preparePreview();
        }

        navigator.mediaDevices.addEventListener("devicechange", populateDeviceList);
      };

      initialize();
    </script>
  </body>
</html>
